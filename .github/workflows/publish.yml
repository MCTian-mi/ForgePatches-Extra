name: Publish to Maven Central

# Publishes io.github.mctian-mi:forgepatches-extra to the Sonatype Central Portal whenever a
# GitHub Release is published. Can also be triggered manually from the Actions tab.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   MAVEN_CENTRAL_USERNAME   - Central Portal user token name  (central.sonatype.com -> Account -> Generate User Token)
#   MAVEN_CENTRAL_PASSWORD   - Central Portal user token password
#   SIGNING_KEY              - ASCII-armored GPG/PGP private key (the full block, including the
#                             "-----BEGIN PGP PRIVATE KEY BLOCK-----" header/footer)
#   SIGNING_KEY_PASSWORD     - passphrase for that key (leave empty secret if the key has none)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Publish and release to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
